<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OSINT Platform — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f13;
  --card:#16161d;
  --border:rgba(255,255,255,.06);
  --accent:#7c6af7;
  --accent-glow:rgba(124,106,247,.3);
  --accent-light:#a699ff;
  --text:#e8e8f0;
  --muted:#6b6b80;
  --dim:#3a3a4a;
  --error:#f7576a;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  font-family:'Syne',sans-serif;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

/* ── animated mesh background ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,106,247,.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(124,106,247,.05) 0%, transparent 60%);
  pointer-events:none;
}

/* ── grid lines ── */
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}

/* ── floating orbs ── */
.orb{
  position:fixed;border-radius:50%;
  filter:blur(80px);pointer-events:none;
  animation:drift 12s ease-in-out infinite;
}
.orb1{width:400px;height:400px;background:rgba(124,106,247,.08);top:-100px;left:-100px;animation-delay:0s}
.orb2{width:300px;height:300px;background:rgba(124,106,247,.06);bottom:-80px;right:-80px;animation-delay:-6s}
@keyframes drift{
  0%,100%{transform:translate(0,0)}
  33%{transform:translate(30px,-20px)}
  66%{transform:translate(-20px,30px)}
}

/* ── card ── */
.card{
  position:relative;z-index:10;
  width:400px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:44px 40px 40px;
  backdrop-filter:blur(20px);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.03),
    0 40px 80px rgba(0,0,0,.5),
    0 0 60px rgba(124,106,247,.04);
  animation:rise .5s cubic-bezier(.22,1,.36,1);
}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* top accent line */
.card::before{
  content:'';
  position:absolute;top:0;left:12%;right:12%;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  border-radius:99px;
}

/* ── header ── */
.logo-wrap{text-align:center;margin-bottom:36px}
.logo-icon{
  width:52px;height:52px;
  background:linear-gradient(135deg,rgba(124,106,247,.2),rgba(124,106,247,.05));
  border:1px solid rgba(124,106,247,.25);
  border-radius:14px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:22px;margin-bottom:14px;
  box-shadow:0 0 24px rgba(124,106,247,.15);
}
.logo-name{
  font-size:22px;font-weight:700;
  color:var(--text);letter-spacing:-.3px;
  display:block;margin-bottom:4px;
}
.logo-sub{
  font-family:'Fira Code',monospace;
  font-size:11px;color:var(--muted);letter-spacing:1px;
}

/* ── form ── */
.field{margin-bottom:16px}
.field-label{
  display:block;font-size:11px;font-weight:600;
  color:var(--muted);letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:7px;
}
.field-input{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  padding:11px 14px;
  font-family:'Fira Code',monospace;
  font-size:13px;
  outline:none;
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.field-input:focus{
  border-color:rgba(124,106,247,.5);
  background:rgba(124,106,247,.04);
  box-shadow:0 0 0 3px rgba(124,106,247,.1);
}
.field-input::placeholder{color:var(--dim);font-size:12px}

/* ── error ── */
.err-box{
  background:rgba(247,87,106,.08);
  border:1px solid rgba(247,87,106,.25);
  border-radius:8px;padding:9px 13px;
  font-family:'Fira Code',monospace;
  font-size:11px;color:var(--error);
  margin-bottom:14px;display:none;
  animation:shake .3s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* ── button ── */
.submit-btn{
  width:100%;margin-top:6px;
  padding:13px;border:none;
  background:var(--accent);
  color:#fff;
  font-family:'Syne',sans-serif;
  font-size:14px;font-weight:600;
  letter-spacing:.3px;
  border-radius:10px;cursor:pointer;
  position:relative;overflow:hidden;
  transition:all .2s;
  box-shadow:0 4px 20px rgba(124,106,247,.35);
}
.submit-btn:hover{background:var(--accent-light);transform:translateY(-1px);box-shadow:0 8px 28px rgba(124,106,247,.45)}
.submit-btn:active{transform:translateY(0)}
.submit-btn:disabled{background:var(--dim);box-shadow:none;cursor:not-allowed;transform:none;color:var(--muted)}
.submit-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);
  pointer-events:none;
}

/* spinner */
.spin{
  display:inline-block;width:13px;height:13px;
  border:2px solid rgba(255,255,255,.25);
  border-top-color:#fff;border-radius:50%;
  animation:sp .6s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── footer ── */
.card-foot{
  text-align:center;margin-top:24px;padding-top:20px;
  border-top:1px solid var(--border);
}
.card-foot-text{
  font-family:'Fira Code',monospace;
  font-size:10px;color:var(--muted);letter-spacing:.5px;
}
.card-foot-text span{color:var(--accent-light)}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">◎</div>
    <span class="logo-name">OSINT Platform</span>
    <span class="logo-sub">intelligence · recon · vulnerability</span>
  </div>

  <div class="err-box" id="errBox"></div>

  <div class="field">
    <label class="field-label" for="uname">Username</label>
    <input class="field-input" id="uname" type="text" placeholder="Enter username"
      autocomplete="username" onkeydown="if(event.key==='Enter')auth()"/>
  </div>
  <div class="field">
    <label class="field-label" for="pass">Password</label>
    <input class="field-input" id="pass" type="password" placeholder="••••••••••"
      autocomplete="current-password" onkeydown="if(event.key==='Enter')auth()"/>
  </div>

  <button class="submit-btn" id="btn" onclick="auth()">Sign In</button>

  <div class="card-foot">
    <p class="card-foot-text">Default credentials: <span>admin</span> / <span>admin123</span></p>
  </div>
</div>

<script>
async function auth() {
  const u = document.getElementById('uname').value.trim();
  const p = document.getElementById('pass').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('errBox');

  if (!u || !p) { showErr('Please enter username and password'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Authenticating…';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p }),
      credentials: 'include',
    });
    if (res.ok) {
      window.location.href = '/';
    } else {
      const d = await res.json();
      showErr(d.detail || 'Authentication failed');
    }
  } catch {
    showErr('Connection error — is the server running?');
  }

  btn.disabled = false;
  btn.innerHTML = 'Sign In';
}

function showErr(msg) {
  const e = document.getElementById('errBox');
  e.textContent = '✕  ' + msg;
  e.style.display = 'block';
}

window.onload = () => document.getElementById('uname').focus();
</script>
</body>
</html>
